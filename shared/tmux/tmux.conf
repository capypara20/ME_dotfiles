# ~/.tmux.conf — 共通の tmux 設定（OS・環境非依存）

# プレフィックスを Ctrl-a に変更（押しやすい）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 設定リロード（prefix → r）
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# マウス操作を有効化（ペイン選択・リサイズ・スクロール）
set -g mouse on

# 色まわり（256色＋本来の色をそのまま）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ウィンドウ／ペイン番号を 1 始まりに（キーボード左端から）
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ペイン分割を直感的なキーに（| と -）、分割時は今のパスを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim 風のペイン移動（prefix → h/j/k/l）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# コピーモードを vi 風に
setw -g mode-keys vi

# スクロールバック履歴を長めに
set -g history-limit 10000

# ステータスバー（控えめ・左にセッション名、右に日時）
set -g status-style "bg=default fg=white"
set -g status-left "[#S] "
set -g status-right "%Y-%m-%d %H:%M "
set -g status-interval 5

# ------------------------------------------------------------------
# このマシン固有の上書き（git管理外。あれば読み込む）
# ------------------------------------------------------------------
if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
